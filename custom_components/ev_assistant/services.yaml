log_charge:
  name: Fremdladung erfassen
  description: >
    Bestaetigt die offene Fremdladung mit manuell abgelesenen Werten
    (geladene kWh und Preis pro kWh vom Ladepunkt-Beleg) und schreibt sie in
    die Historie. Ohne offene Ladung wird ein Einzeleintrag angelegt.
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    kwh:
      name: Geladene kWh
      description: Am Ladepunkt abgerechnete Energiemenge (inkl. Verluste).
      required: true
      example: 21.4
      selector:
        number:
          min: 0
          max: 200
          step: 0.1
          unit_of_measurement: kWh
          mode: box
    price_kwh:
      name: Preis pro kWh
      description: Preis pro Kilowattstunde.
      required: true
      example: 0.59
      selector:
        number:
          min: 0
          max: 5
          step: 0.001
          unit_of_measurement: EUR/kWh
          mode: box
    start_ts:
      name: Startzeit (Unix)
      description: Optional, nur fuer Einzeleintraege ohne offene Ladung.
      required: false
      example: 1751884800
      selector:
        number:
          mode: box

discard_pending:
  name: Offene Fremdladung verwerfen
  description: Verwirft die aktuell offene, unbestaetigte Fremdladung.
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant

simulate_event:
  name: Fremdladung simulieren (Test)
  description: >
    Erzeugt zum Testen eine offene Fremdladung (ohne Auto). Loest
    Benachrichtigung, MQTT-Publish und Sensoren aus.
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    soc_start:
      name: SoC Start (%)
      required: true
      example: 32
      selector:
        number: { min: 0, max: 100, step: 1, mode: box }
    soc_end:
      name: SoC Ende (%)
      required: true
      example: 74
      selector:
        number: { min: 0, max: 100, step: 1, mode: box }
    energy_source:
      name: Energiequelle
      required: false
      example: soc
      selector:
        select:
          options: [soc, power_ac, power_dc]
