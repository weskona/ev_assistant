log_charge:
  name: Fremdladung erfassen
  description: >
    Bestaetigt eine offene Fremdladung mit manuell abgelesenen Werten
    (geladene kWh und Preis pro kWh vom Ladepunkt-Beleg) und schreibt sie in
    die Historie. Sind mehrere Fremdladungen gleichzeitig offen, waehlt
    start_ts die gemeinte aus (ohne Angabe: die aelteste). Ohne offene
    Ladung wird ein Einzeleintrag angelegt.
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    kwh:
      name: Geladene kWh
      description: Am Ladepunkt abgerechnete Energiemenge (inkl. Verluste).
      required: true
      example: 21.4
      selector:
        number:
          min: 0
          max: 200
          step: 0.1
          unit_of_measurement: kWh
          mode: box
    price_kwh:
      name: Preis pro kWh
      description: Preis pro Kilowattstunde.
      required: true
      example: 0.59
      selector:
        number:
          min: 0
          max: 5
          step: 0.001
          unit_of_measurement: EUR/kWh
          mode: box
    start_ts:
      name: Startzeit (Unix)
      description: >
        Optional. Bei mehreren gleichzeitig offenen Fremdladungen: waehlt
        die zu bestaetigende aus (Wert aus deren start_ts-Attribut). Ohne
        offene Ladung: Startzeit fuer einen manuellen Einzeleintrag.
      required: false
      example: 1751884800
      selector:
        number:
          mode: box

discard_pending:
  name: Offene Fremdladung verwerfen
  description: >
    Verwirft eine offene, unbestaetigte Fremdladung. Sind mehrere
    gleichzeitig offen, waehlt start_ts die gemeinte aus (ohne Angabe: die
    aelteste).
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    start_ts:
      name: Startzeit (Unix)
      description: >
        Optional. Bei mehreren gleichzeitig offenen Fremdladungen: waehlt
        die zu verwerfende aus (Wert aus deren start_ts-Attribut).
      required: false
      example: 1751884800
      selector:
        number:
          mode: box

edit_charge:
  name: Fremdladung nachträglich korrigieren
  description: >
    Korrigiert kWh und/oder Preis eines bereits erfassten Historien-
    Eintrags nachtraeglich (z.B. Tippfehler beim Erfassen bemerkt). Die
    Gesamtsummen (kWh/Kosten) werden um die Differenz angepasst, die
    Anzahl bleibt unveraendert. Der zu korrigierende Eintrag wird ueber
    erfasst_ts identifiziert (Wert aus dessen erfasst_ts-Attribut in der
    Historie).
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    erfasst_ts:
      name: Erfasst-Zeitstempel (Unix)
      description: Identifiziert den zu korrigierenden Historien-Eintrag (Wert aus dessen erfasst_ts-Attribut).
      required: true
      example: 1751884800
      selector:
        number:
          mode: box
    kwh:
      name: Geladene kWh
      description: Korrigierte Energiemenge.
      required: true
      example: 21.4
      selector:
        number:
          min: 0
          max: 200
          step: 0.1
          unit_of_measurement: kWh
          mode: box
    price_kwh:
      name: Preis pro kWh
      description: Korrigierter Preis pro Kilowattstunde.
      required: true
      example: 0.59
      selector:
        number:
          min: 0
          max: 5
          step: 0.001
          unit_of_measurement: EUR/kWh
          mode: box

simulate_event:
  name: Fremdladung simulieren (Test)
  description: >
    Erzeugt zum Testen eine offene Fremdladung (ohne Auto). Loest
    Benachrichtigung, MQTT-Publish und Sensoren aus.
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    soc_start:
      name: SoC Start (%)
      required: true
      example: 32
      selector:
        number: { min: 0, max: 100, step: 1, mode: box }
    soc_end:
      name: SoC Ende (%)
      required: true
      example: 74
      selector:
        number: { min: 0, max: 100, step: 1, mode: box }
    energy_source:
      name: Energiequelle
      required: false
      example: soc
      selector:
        select:
          options: [soc, power_ac, power_dc]
