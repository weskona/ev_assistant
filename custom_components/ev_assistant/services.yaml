log_charge:
  name: Fremdladung erfassen
  description: >
    Bestaetigt eine offene Fremdladung mit manuell abgelesenen Werten
    (geladene kWh und Preis pro kWh vom Ladepunkt-Beleg) und schreibt sie in
    die Historie. Sind mehrere Fremdladungen gleichzeitig offen, waehlt
    start_ts die gemeinte aus (ohne Angabe: die aelteste). Ohne offene
    Ladung wird ein Einzeleintrag angelegt.
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    kwh:
      name: Geladene kWh
      description: Am Ladepunkt abgerechnete Energiemenge (inkl. Verluste).
      required: true
      example: 21.4
      selector:
        number:
          min: 0
          max: 200
          step: 0.1
          unit_of_measurement: kWh
          mode: box
    price_kwh:
      name: Preis pro kWh
      description: Preis pro Kilowattstunde.
      required: true
      example: 0.59
      selector:
        number:
          min: 0
          max: 5
          step: 0.001
          unit_of_measurement: EUR/kWh
          mode: box
    start_ts:
      name: Startzeit (Unix)
      description: >
        Optional. Bei mehreren gleichzeitig offenen Fremdladungen: waehlt
        die zu bestaetigende aus (Wert aus deren start_ts-Attribut). Ohne
        offene Ladung: Startzeit fuer einen manuellen Einzeleintrag.
      required: false
      example: 1751884800
      selector:
        number:
          mode: box

discard_pending:
  name: Offene Fremdladung verwerfen
  description: >
    Verwirft eine offene, unbestaetigte Fremdladung. Sind mehrere
    gleichzeitig offen, waehlt start_ts die gemeinte aus (ohne Angabe: die
    aelteste).
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    start_ts:
      name: Startzeit (Unix)
      description: >
        Optional. Bei mehreren gleichzeitig offenen Fremdladungen: waehlt
        die zu verwerfende aus (Wert aus deren start_ts-Attribut).
      required: false
      example: 1751884800
      selector:
        number:
          mode: box

edit_charge:
  name: Fremdladung nachträglich korrigieren
  description: >
    Korrigiert kWh und/oder Preis eines bereits erfassten Historien-
    Eintrags nachtraeglich (z.B. Tippfehler beim Erfassen bemerkt). Die
    Gesamtsummen (kWh/Kosten) werden um die Differenz angepasst, die
    Anzahl bleibt unveraendert. Der zu korrigierende Eintrag wird ueber
    erfasst_ts identifiziert (Wert aus dessen erfasst_ts-Attribut in der
    Historie).
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    erfasst_ts:
      name: Erfasst-Zeitstempel (Unix)
      description: Identifiziert den zu korrigierenden Historien-Eintrag (Wert aus dessen erfasst_ts-Attribut).
      required: true
      example: 1751884800
      selector:
        number:
          mode: box
    kwh:
      name: Geladene kWh
      description: Korrigierte Energiemenge.
      required: true
      example: 21.4
      selector:
        number:
          min: 0
          max: 200
          step: 0.1
          unit_of_measurement: kWh
          mode: box
    price_kwh:
      name: Preis pro kWh
      description: Korrigierter Preis pro Kilowattstunde.
      required: true
      example: 0.59
      selector:
        number:
          min: 0
          max: 5
          step: 0.001
          unit_of_measurement: EUR/kWh
          mode: box

delete_charge:
  name: Fremdladung löschen
  description: >
    Löscht einen bereits erfassten Historien-Eintrag vollständig (z.B.
    eine fälschlich erkannte Fremdladung, die gar keine war). Die
    Gesamtsummen (kWh/Kosten/Anzahl) werden entsprechend verringert.
    Nicht rückgängig zu machen. Der zu löschende Eintrag wird über
    erfasst_ts identifiziert (Wert aus dessen erfasst_ts-Attribut in der
    Historie).
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    erfasst_ts:
      name: Erfasst-Zeitstempel (Unix)
      description: Identifiziert den zu löschenden Historien-Eintrag (Wert aus dessen erfasst_ts-Attribut).
      required: true
      example: 1751884800
      selector:
        number:
          mode: box

simulate_event:
  name: Fremdladung simulieren (Test)
  description: >
    Erzeugt zum Testen eine offene Fremdladung (ohne Auto). Loest
    Benachrichtigung, MQTT-Publish und Sensoren aus.
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    soc_start:
      name: SoC Start (%)
      required: true
      example: 32
      selector:
        number: { min: 0, max: 100, step: 1, mode: box }
    soc_end:
      name: SoC Ende (%)
      required: true
      example: 74
      selector:
        number: { min: 0, max: 100, step: 1, mode: box }
    energy_source:
      name: Energiequelle
      required: false
      example: soc
      selector:
        select:
          options: [soc, power_ac, power_dc]

log_trip:
  name: Fahrt erfassen
  description: >
    Bestaetigt eine offene, automatisch erkannte Fahrt mit Start- und
    Zielort. Sind mehrere Fahrten gleichzeitig offen, waehlt start_ts die
    gemeinte aus (ohne Angabe: die aelteste). Ohne offene Fahrt passiert
    nichts -- Kilometerstand-Werte stammen ausschliesslich aus der
    Erkennung, nicht aus einem manuellen Einzeleintrag.
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    start_ort:
      name: Startort
      required: true
      example: Zuhause
      selector:
        text:
    end_ort:
      name: Zielort
      required: true
      example: Büro
      selector:
        text:
    start_ts:
      name: Startzeit (Unix)
      description: >
        Optional. Bei mehreren gleichzeitig offenen Fahrten: waehlt die zu
        bestaetigende aus (Wert aus deren start_ts-Attribut).
      required: false
      example: 1751884800
      selector:
        number:
          mode: box

discard_pending_trip:
  name: Offene Fahrt verwerfen
  description: >
    Verwirft eine offene, unbestaetigte Fahrt. Sind mehrere gleichzeitig
    offen, waehlt start_ts die gemeinte aus (ohne Angabe: die aelteste).
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    start_ts:
      name: Startzeit (Unix)
      description: >
        Optional. Bei mehreren gleichzeitig offenen Fahrten: waehlt die zu
        verwerfende aus (Wert aus deren start_ts-Attribut).
      required: false
      example: 1751884800
      selector:
        number:
          mode: box

export_fahrtenbuch:
  name: Fahrtenbuch exportieren
  description: >
    Schreibt das komplette Fahrtenbuch als CSV-Datei nach
    /config/www/ev_assistant_fahrtenbuch_[config_entry_id].csv (chronologisch
    aufsteigend) und meldet den Download-Link per Benachrichtigung.
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant

simulate_trip:
  name: Fahrt simulieren (Test)
  description: >
    Erzeugt zum Testen eine offene Fahrt (ohne Auto). Loest
    Benachrichtigung und Sensoren aus.
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    km:
      name: Strecke (km)
      required: true
      example: 12.5
      selector:
        number:
          min: 0
          max: 2000
          step: 0.1
          unit_of_measurement: km
          mode: box

edit_trip:
  name: Fahrt nachträglich korrigieren
  description: >
    Korrigiert Start-/Zielort eines bereits bestätigten Fahrtenbuch-
    Eintrags nachträglich (z.B. Tippfehler beim Erfassen bemerkt).
    Kilometerstand und Strecke sind nicht editierbar, da sie
    ausschließlich aus der automatischen Erkennung stammen.
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    erfasst_ts:
      name: Erfasst-Zeitstempel (Unix)
      description: Identifiziert den zu korrigierenden Fahrtenbuch-Eintrag (Wert aus dessen erfasst_ts-Attribut).
      required: true
      example: 1751884800
      selector:
        number:
          mode: box
    start_ort:
      name: Startort
      required: true
      example: Zuhause
      selector:
        text:
    end_ort:
      name: Zielort
      required: true
      example: Büro
      selector:
        text:

delete_trip:
  name: Fahrt löschen
  description: >
    Löscht einen bereits bestätigten Fahrtenbuch-Eintrag vollständig
    (z.B. eine fälschlich erkannte Fahrt). Die Gesamtsummen (km/Anzahl)
    werden entsprechend verringert. Nicht rückgängig zu machen.
  fields:
    config_entry_id:
      name: Fahrzeug
      description: Welches Fahrzeug (bei mehreren EV-Assistant-Instanzen).
      required: true
      selector:
        config_entry:
          integration: ev_assistant
    erfasst_ts:
      name: Erfasst-Zeitstempel (Unix)
      description: Identifiziert den zu löschenden Fahrtenbuch-Eintrag (Wert aus dessen erfasst_ts-Attribut).
      required: true
      example: 1751884800
      selector:
        number:
          mode: box
