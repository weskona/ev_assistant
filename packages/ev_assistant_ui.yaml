# =====================================================================
# UI-Glue fuer die ev_assistant Integration: manuelle Eingabe per Formular.
# Ablage: config/packages/ev_assistant_ui.yaml
#   (configuration.yaml -> homeassistant: packages: !include_dir_named packages)
# Die Buttons rufen die Integrations-Services auf (kein eigenes MQTT/Persistenz).
#
# Hinweis: Diese eine UI kann immer nur EIN Fahrzeug gleichzeitig bedienen —
# `ev_assistant_config_entry_id` merkt sich, welche Instanz zuletzt eine
# Fremdladung gemeldet hat (config_entry_id steht seit v0.4.0 im Event-Payload).
# Bei mehreren Fahrzeugen gewinnt die zuletzt gemeldete Fremdladung.
# =====================================================================

input_number:
  ev_assistant_kwh:
    name: Fremdladung geladene kWh
    min: 0
    max: 200
    step: 0.1
    unit_of_measurement: kWh
    mode: box
    icon: mdi:ev-station
  ev_assistant_preis:
    name: Fremdladung Preis pro kWh
    min: 0
    max: 5
    step: 0.001
    unit_of_measurement: "EUR/kWh"
    mode: box
    icon: mdi:currency-eur
    # Kein separates Prefill noetig: input_number behaelt von sich aus den
    # zuletzt eingegebenen Wert ueber Neustarts hinweg als Vorbelegung.

input_text:
  ev_assistant_config_entry_id:
    name: Fremdladung Ziel-Fahrzeug (intern)
    icon: mdi:car-electric

input_button:
  ev_assistant_speichern:
    name: Fremdladung speichern
    icon: mdi:content-save
  ev_assistant_verwerfen:
    name: Fremdladung verwerfen
    icon: mdi:trash-can-outline

automation:
  - alias: "Fremdladung erkannt -> Formular vorbelegen"
    id: ev_assistant_prefill
    mode: queued
    trigger:
      - platform: event
        event_type: ev_assistant_pending
    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.ev_assistant_config_entry_id
        data:
          value: "{{ trigger.event.data.config_entry_id }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.ev_assistant_kwh
        data:
          value: "{{ trigger.event.data.energy_kwh | float(0) | round(1) }}"

  - alias: "Fremdladung speichern -> Service"
    id: ev_assistant_save
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.ev_assistant_speichern
    action:
      - service: ev_assistant.log_charge
        data:
          config_entry_id: "{{ states('input_text.ev_assistant_config_entry_id') }}"
          kwh: "{{ states('input_number.ev_assistant_kwh') | float(0) }}"
          price_kwh: "{{ states('input_number.ev_assistant_preis') | float(0) }}"

  - alias: "Fremdladung verwerfen -> Service"
    id: ev_assistant_discard
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.ev_assistant_verwerfen
    action:
      - service: ev_assistant.discard_pending
        data:
          config_entry_id: "{{ states('input_text.ev_assistant_config_entry_id') }}"
